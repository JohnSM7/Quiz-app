<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Quiz Arena - Feedback Inmediato</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "on-surface": "#f6f3f5",
                "surface-container-high": "#1f1f22",
                "secondary": "#26fedc",
                "on-tertiary-fixed-variant": "#526900",
                "surface-container": "#19191c",
                "secondary-container": "#006b5b",
                "primary": "#d095ff",
                "primary-fixed": "#c782ff",
                "primary-fixed-dim": "#bd6efe",
                "on-background": "#f6f3f5",
                "surface-variant": "#262528",
                "on-error": "#490013",
                "on-error-container": "#ffb2b9",
                "secondary-dim": "#00efce",
                "surface-container-lowest": "#000000",
                "on-secondary": "#005d4f",
                "on-secondary-fixed": "#00483d",
                "background": "#0e0e10",
                "surface-bright": "#2c2c2f",
                "surface-tint": "#d095ff",
                "outline-variant": "#48474a",
                "on-primary-container": "#38005e",
                "on-tertiary-fixed": "#3a4a00",
                "surface-container-low": "#131315",
                "secondary-fixed-dim": "#00efce",
                "on-primary-fixed-variant": "#450073",
                "on-tertiary": "#516700",
                "error-container": "#a70138",
                "on-surface-variant": "#acaaad",
                "inverse-surface": "#fcf8fb",
                "error": "#ff6e84",
                "on-primary": "#490078",
                "on-secondary-fixed-variant": "#006859",
                "tertiary-container": "#cafd00",
                "primary-dim": "#c57eff",
                "primary-container": "#c782ff",
                "surface-container-highest": "#262528",
                "on-tertiary-container": "#4a5e00",
                "outline": "#767577",
                "tertiary-fixed-dim": "#beee00",
                "on-secondary-container": "#ddfff5",
                "error-dim": "#d73357",
                "tertiary-dim": "#beee00",
                "surface-dim": "#0e0e10",
                "on-primary-fixed": "#000000",
                "inverse-primary": "#8534c4",
                "surface": "#0e0e10",
                "secondary-fixed": "#26fedc",
                "inverse-on-surface": "#555557",
                "tertiary-fixed": "#cafd00",
                "tertiary": "#f3ffca"
              },
              fontFamily: {
                "headline": ["Plus Jakarta Sans"],
                "body": ["Be Vietnam Pro"],
                "label": ["Plus Jakarta Sans"]
              },
              borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-confetti {
            background-image: radial-gradient(circle at 20% 30%, #26fedc 1px, transparent 1px),
                              radial-gradient(circle at 70% 60%, #cafd00 1px, transparent 1px),
                              radial-gradient(circle at 40% 80%, #d095ff 1px, transparent 1px),
                              radial-gradient(circle at 80% 20%, #26fedc 1px, transparent 1px);
            background-size: 100px 100px;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body selection:bg-secondary/30">
<!-- TopAppBar -->
<header class="fixed top-0 w-full flex justify-between items-center px-6 py-4 h-20 bg-[#0e0e10]/80 backdrop-blur-xl border-none bg-surface-container-low shadow-2xl shadow-[#9D4EDD]/10 z-50">
<div class="flex items-center gap-2">
<span class="text-[#d095ff] font-black italic tracking-tighter text-2xl">QUIZ ARENA</span>
</div>
<div class="flex items-center gap-6">
<div class="hidden md:flex gap-8">
<span class="font-['Plus_Jakarta_Sans'] font-bold tracking-tight text-xl uppercase text-[#26fedc] border-b-2 border-[#26fedc] pb-1 cursor-pointer">GAME</span>
<span class="font-['Plus_Jakarta_Sans'] font-bold tracking-tight text-xl uppercase text-[#d095ff]/60 hover:brightness-125 transition-all duration-200 cursor-pointer">LEADERBOARD</span>
</div>
<div class="flex gap-4">
<button class="text-[#d095ff]/60 hover:brightness-125 transition-all duration-200 active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="timer">timer</span>
</button>
<button class="text-[#d095ff]/60 hover:brightness-125 transition-all duration-200 active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="pause_circle">pause_circle</span>
</button>
</div>
</div>
</header>
<main class="min-h-screen pt-20 pb-32 flex items-center justify-center px-4 relative overflow-hidden">
<!-- Background Energy Glows -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-secondary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute top-1/4 right-0 w-[400px] h-[400px] bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Success Feedback Canvas -->
<div class="relative z-10 w-full max-w-2xl">
<!-- Overlay Container with Glassmorphism -->
<div class="bg-surface-variant/60 backdrop-blur-2xl rounded-xl p-8 md:p-12 text-center border-none shadow-[0_0_80px_rgba(38,254,220,0.15)] bg-confetti">
<!-- Feedback Header -->
<div class="mb-8 space-y-2">
<div class="inline-flex items-center justify-center w-24 h-24 bg-secondary rounded-full mb-6 shadow-[0_0_40px_#26fedc66]">
<span class="material-symbols-outlined text-on-secondary text-5xl font-bold" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h1 class="font-headline text-6xl md:text-8xl font-black tracking-tighter text-secondary italic">
                        ¡CORRECTO!
                    </h1>
<p class="font-body text-secondary/80 text-lg md:text-xl font-semibold tracking-wide uppercase">
                        Respuesta Perfecta
                    </p>
</div>
<!-- Bento Grid Score Display -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-12">
<!-- Points Card -->
<div class="bg-surface-container-highest p-6 rounded-lg flex flex-col items-center justify-center transform hover:scale-[1.02] transition-transform">
<span class="text-tertiary-container font-headline text-5xl font-extrabold tracking-tighter">+450 PTS</span>
<span class="text-on-surface-variant font-label text-xs tracking-widest uppercase mt-2">Puntos Ganados</span>
</div>
<!-- Streak Card -->
<div class="bg-surface-container-highest p-6 rounded-lg flex flex-col items-center justify-center transform hover:scale-[1.02] transition-transform">
<div class="flex items-center gap-2">
<span class="text-error font-headline text-5xl font-extrabold tracking-tighter">3X</span>
<span class="material-symbols-outlined text-error text-4xl" data-icon="local_fire_department" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
</div>
<span class="text-on-surface-variant font-label text-xs tracking-widest uppercase mt-2">RACHA ACTUAL</span>
</div>
</div>
<!-- Multiplier Accent -->
<div class="mt-8 flex justify-center">
<div class="bg-tertiary text-on-tertiary px-6 py-2 rounded-full font-headline font-bold text-sm tracking-widest uppercase flex items-center gap-2 shadow-[0_4px_20px_rgba(202,253,0,0.3)]">
<span class="material-symbols-outlined text-sm" data-icon="bolt">bolt</span>
                        Multiplicador de Velocidad Activado
                    </div>
</div>
<!-- Action CTA -->
<div class="mt-12">
<button class="w-full md:w-auto px-12 py-5 bg-gradient-to-r from-primary to-primary-container text-on-primary-container font-headline font-extrabold text-xl rounded-full hover:brightness-110 active:scale-95 transition-all shadow-[0_8px_32px_rgba(208,149,255,0.4)]">
                        SIGUIENTE PREGUNTA
                    </button>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-6 bg-[#0e0e10] rounded-t-[2rem] shadow-[0_-8px_32px_rgba(157,78,221,0.15)]">
<div class="flex flex-col items-center justify-center text-[#d095ff]/50 px-6 py-2 hover:bg-[#d095ff]/10 rounded-full transition-all cursor-pointer">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-['Plus_Jakarta_Sans'] font-extrabold tracking-widest text-xs uppercase">APODO</span>
</div>
<div class="flex flex-col items-center justify-center bg-[#26fedc]/20 text-[#26fedc] rounded-full px-6 py-2 transition-all cursor-pointer">
<span class="material-symbols-outlined mb-1" data-icon="stars" style="font-variation-settings: 'FILL' 1;">stars</span>
<span class="font-['Plus_Jakarta_Sans'] font-extrabold tracking-widest text-xs uppercase">8,450 PTS</span>
</div>
<div class="flex flex-col items-center justify-center text-[#d095ff]/50 px-6 py-2 hover:bg-[#d095ff]/10 rounded-full transition-all cursor-pointer">
<span class="material-symbols-outlined mb-1" data-icon="local_fire_department">local_fire_department</span>
<span class="font-['Plus_Jakarta_Sans'] font-extrabold tracking-widest text-xs uppercase">RACHA X3</span>
</div>
</nav>
<!-- Hidden Error State (Logic Placeholder for Glitch effect description) -->
<!-- 
    The '¡FALLASTE!' screen would swap:
    - Background Glow to error/20
    - Text '¡FALLASTE!' in error color
    - Icon to 'cancel'
    - 'RACHA PERDIDA' label
    - Background confetti to subtle dark glitch textures
    -->
</body></html>
