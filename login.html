<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Electric Arena - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&amp;family=Be+Vietnam+Pro:wght@400;500&amp;family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#d095ff",
                "secondary": "#26fedc",
                "accent": "#9c42f4",
                "background-light": "#f7f5f8",
                "background-dark": "#080b27",
              },
              fontFamily: {
                "display": ["Plus Jakarta Sans", "Public Sans", "sans-serif"],
                "body": ["Be Vietnam Pro", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
            },
          },
        }
      </script>
<style>
        .glass {
            background: rgba(208, 149, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(208, 149, 255, 0.2);
        }
        .neon-glow-purple {
            text-shadow: 0 0 15px rgba(208, 149, 255, 0.6);
        }
        .bg-kinetic {
            background: radial-gradient(circle at 20% 30%, rgba(208, 149, 255, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(38, 254, 220, 0.1) 0%, transparent 40%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-body min-h-screen flex flex-col items-center justify-center text-slate-900 dark:text-slate-100 p-6 overflow-x-hidden relative">
<!-- Decorative background elements -->
<div class="fixed inset-0 bg-kinetic pointer-events-none"></div>
<div class="fixed -top-24 -left-24 w-96 h-96 bg-primary/20 blur-[120px] rounded-full pointer-events-none"></div>
<div class="fixed -bottom-24 -right-24 w-96 h-96 bg-secondary/10 blur-[120px] rounded-full pointer-events-none"></div>
<div class="w-full max-w-[440px] z-10 flex flex-col">
<!-- Header Section -->
<header class="text-center mb-12">
<div class="inline-flex items-center justify-center p-4 mb-6 rounded-full bg-primary/10 border border-primary/20">
<span class="material-symbols-outlined text-primary text-4xl">bolt</span>
</div>
<h1 class="font-display text-4xl md:text-5xl font-extrabold tracking-tighter text-primary neon-glow-purple mb-3">
                ELECTRIC ARENA
            </h1>
<p class="text-slate-400 text-lg">Inicia sesión para entrar en la arena</p>
</header>
<!-- Form Section -->
<div class="space-y-6">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-primary/80 ml-1">Email/Usuario</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/50">person</span>
<input class="glass w-full h-14 pl-12 pr-4 rounded-xl text-slate-100 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all" placeholder="Tu usuario o email" type="text"/>
</div>
</div>
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center px-1">
<label class="text-sm font-medium text-primary/80">Contraseña</label>
<a class="text-xs text-secondary hover:text-primary transition-colors" href="#">¿Olvidaste tu contraseña?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/50">lock</span>
<input class="glass w-full h-14 pl-12 pr-12 rounded-xl text-slate-100 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all" placeholder="Tu contraseña secreta" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-primary/50 hover:text-primary transition-colors">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<button class="w-full h-14 mt-4 bg-gradient-to-r from-primary to-accent rounded-xl text-background-dark font-display font-bold text-lg tracking-widest hover:shadow-[0_0_30px_rgba(208,149,255,0.4)] active:scale-[0.98] transition-all uppercase">
                ENTRAR
            </button>
</div>
<!-- Divider -->
<div class="flex items-center gap-4 my-10">
<div class="h-[1px] flex-1 bg-gradient-to-r from-transparent to-primary/30"></div>
<span class="text-xs font-medium text-slate-500 uppercase tracking-widest">O entra con</span>
<div class="h-[1px] flex-1 bg-gradient-to-l from-transparent to-primary/30"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="glass h-14 rounded-xl flex items-center justify-center gap-3 hover:bg-white/5 transition-colors">
<div class="w-6 h-6 flex items-center justify-center">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
</div>
<span class="text-sm font-semibold">Google</span>
</button>
<button class="glass h-14 rounded-xl flex items-center justify-center gap-3 hover:bg-white/5 transition-colors">
<div class="w-6 h-6 flex items-center justify-center">
<svg class="w-6 h-6" fill="#1877F2" viewbox="0 0 24 24">
<path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"></path>
</svg>
</div>
<span class="text-sm font-semibold">Facebook</span>
</button>
</div>
<!-- Footer link -->
<footer class="mt-12 text-center">
<p class="text-slate-400 text-sm">
                ¿Nuevo en la arena? 
                <a class="text-secondary font-bold hover:underline ml-1" href="#">Crea una cuenta</a>
</p>
</footer>
</div>
<!-- Decorative Stage Element -->
<div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-[120%] h-[176px] bg-gradient-to-t from-primary/10 to-transparent blur-3xl opacity-50"></div>
</body></html>
