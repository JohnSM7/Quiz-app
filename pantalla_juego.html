<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Quiz Arena - La Partida</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-surface": "#f6f3f5",
              "surface-container-high": "#1f1f22",
              "secondary": "#26fedc",
              "on-tertiary-fixed-variant": "#526900",
              "surface-container": "#19191c",
              "secondary-container": "#006b5b",
              "primary": "#d095ff",
              "primary-fixed": "#c782ff",
              "primary-fixed-dim": "#bd6efe",
              "on-background": "#f6f3f5",
              "surface-variant": "#262528",
              "on-error": "#490013",
              "on-error-container": "#ffb2b9",
              "secondary-dim": "#00efce",
              "surface-container-lowest": "#000000",
              "on-secondary": "#005d4f",
              "on-secondary-fixed": "#00483d",
              "background": "#0e0e10",
              "surface-bright": "#2c2c2f",
              "surface-tint": "#d095ff",
              "outline-variant": "#48474a",
              "on-primary-container": "#38005e",
              "on-tertiary-fixed": "#3a4a00",
              "surface-container-low": "#131315",
              "secondary-fixed-dim": "#00efce",
              "on-primary-fixed-variant": "#450073",
              "on-tertiary": "#516700",
              "error-container": "#a70138",
              "on-surface-variant": "#acaaad",
              "inverse-surface": "#fcf8fb",
              "error": "#ff6e84",
              "on-primary": "#490078",
              "on-secondary-fixed-variant": "#006859",
              "tertiary-container": "#cafd00",
              "primary-dim": "#c57eff",
              "primary-container": "#c782ff",
              "surface-container-highest": "#262528",
              "on-tertiary-container": "#4a5e00",
              "outline": "#767577",
              "tertiary-fixed-dim": "#beee00",
              "on-secondary-container": "#ddfff5",
              "error-dim": "#d73357",
              "tertiary-dim": "#beee00",
              "surface-dim": "#0e0e10",
              "on-primary-fixed": "#000000",
              "inverse-primary": "#8534c4",
              "surface": "#0e0e10",
              "secondary-fixed": "#26fedc",
              "inverse-on-surface": "#555557",
              "tertiary-fixed": "#cafd00",
              "tertiary": "#f3ffca"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Be Vietnam Pro"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        background-color: #0e0e10;
        color: #f6f3f5;
        font-family: 'Be Vietnam Pro', sans-serif;
      }
      .glass-card {
        background: rgba(31, 31, 34, 0.6);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
      }
      .bento-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: auto;
        gap: 1.5rem;
      }
    </style>
</head>
<body class="bg-background text-on-background selection:bg-secondary selection:text-on-secondary">
<!-- TopAppBar -->
<header class="fixed top-0 w-full flex justify-between items-center px-6 py-4 h-20 bg-[#0e0e10]/80 backdrop-blur-xl z-50 shadow-2xl shadow-[#9D4EDD]/10">
<div class="text-[#d095ff] font-black italic tracking-tighter text-2xl">
            QUIZ ARENA
        </div>
<div class="flex items-center gap-6">
<div class="flex items-center gap-2 px-4 py-2 bg-surface-container-low rounded-full">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">timer</span>
<span class="font-headline font-bold text-secondary text-xl">15s</span>
</div>
<div class="flex gap-4">
<button class="hover:brightness-125 transition-all duration-200 active:scale-95 duration-150 text-[#d095ff]">
<span class="material-symbols-outlined text-3xl">pause_circle</span>
</button>
</div>
</div>
</header>
<main class="pt-24 pb-32 px-4 md:px-8 max-w-7xl mx-auto min-h-screen">
<div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
<!-- Question & Media Section -->
<div class="lg:col-span-8 flex flex-col gap-6">
<!-- Question Card -->
<div class="surface-container-high rounded-lg p-8 relative overflow-hidden">
<div class="absolute top-0 left-0 w-2 h-full bg-primary"></div>
<span class="font-label text-primary/60 text-xs tracking-[0.2em] font-bold uppercase mb-4 block">PREGUNTA 08/20</span>
<h1 class="font-headline font-extrabold text-3xl md:text-4xl leading-tight text-on-surface">
                        ¿Cuál es el nombre del martillo de Thor?
                    </h1>
</div>
<!-- Central Media Canvas -->
<div class="relative aspect-video w-full rounded-lg overflow-hidden bg-surface-container-highest group">
<img alt="Thor catchng Mjolnir cinematic shot" class="w-full h-full object-cover brightness-75 group-hover:scale-105 transition-transform duration-700" data-alt="Cinematic shot of Thor catching the glowing Mjolnir hammer" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAOmgqRsRFhaBokF0kAqckeBFM2_L5UF5wqe3zzr4elnUy-utP0LnTYKnLi0RZnxtxcgTuMsKjynyAB6fiAvkLMd1g4FIhLPwWFxpyTj0YzCelofEsNG6QpyRwCGg3YEYOnj_yf-qX89-uuuXqpufO7DYwYNyXCDhmFitCNHY5KiKPAsm5jVnPGursvZBD-vadHFDZiy7bxk61445bbXu6U1GCsf9--6nsxF7rj2G4h4zPIeEjtfADEWUVWa3BNDB2aUnazlw1YKcU"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent opacity-60"></div>
<!-- Floating Progress Visualizer -->
<div class="absolute bottom-6 left-6 right-6">
<div class="h-1.5 w-full bg-on-surface/10 rounded-full overflow-hidden">
<div class="h-full bg-secondary w-1/2 shadow-[0_0_12px_rgba(38,254,220,0.5)]"></div>
</div>
</div>
</div>
</div>
<!-- Interaction Section (Asymmetric Bento Grid) -->
<div class="lg:col-span-4 flex flex-col gap-4">
<div class="grid grid-cols-1 gap-4 h-full">
<!-- Response A: Primary Success -->
<button class="group relative flex items-center justify-between p-6 bg-surface-container-high rounded-lg hover:bg-secondary/10 transition-all duration-300 active:scale-95 text-left overflow-hidden">
<div class="z-10 flex items-center gap-4">
<span class="w-10 h-10 flex items-center justify-center rounded-full bg-secondary/20 text-secondary font-headline font-black">A</span>
<span class="font-headline font-bold text-lg text-on-surface">Mjolnir</span>
</div>
<div class="absolute right-0 top-0 h-full w-1 bg-secondary opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
<!-- Response B: Error Context -->
<button class="group relative flex items-center justify-between p-6 bg-surface-container-high rounded-lg hover:bg-error/10 transition-all duration-300 active:scale-95 text-left overflow-hidden">
<div class="z-10 flex items-center gap-4">
<span class="w-10 h-10 flex items-center justify-center rounded-full bg-error/20 text-error font-headline font-black">B</span>
<span class="font-headline font-bold text-lg text-on-surface">Stormbreaker</span>
</div>
<div class="absolute right-0 top-0 h-full w-1 bg-error opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
<!-- Response C: High Contrast Tertiary -->
<button class="group relative flex items-center justify-between p-6 bg-surface-container-high rounded-lg hover:bg-tertiary-container/10 transition-all duration-300 active:scale-95 text-left overflow-hidden">
<div class="z-10 flex items-center gap-4">
<span class="w-10 h-10 flex items-center justify-center rounded-full bg-tertiary-container/20 text-tertiary-container font-headline font-black">C</span>
<span class="font-headline font-bold text-lg text-on-surface">Gungnir</span>
</div>
<div class="absolute right-0 top-0 h-full w-1 bg-tertiary-container opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
<!-- Response D: Primary Brand Tint -->
<button class="group relative flex items-center justify-between p-6 bg-surface-container-high rounded-lg hover:bg-primary/10 transition-all duration-300 active:scale-95 text-left overflow-hidden">
<div class="z-10 flex items-center gap-4">
<span class="w-10 h-10 flex items-center justify-center rounded-full bg-primary/20 text-primary font-headline font-black">D</span>
<span class="font-headline font-bold text-lg text-on-surface">Hofund</span>
</div>
<div class="absolute right-0 top-0 h-full w-1 bg-primary opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
<!-- Power-Up Booster -->
<div class="mt-4 p-6 glass-card rounded-lg border border-outline-variant/10 flex items-center justify-between">
<div class="flex flex-col">
<span class="text-xs font-bold text-secondary tracking-widest uppercase">COMBO ACTIVO</span>
<span class="text-2xl font-headline font-black italic text-on-surface">X2 XP</span>
</div>
<span class="material-symbols-outlined text-4xl text-secondary" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-6 bg-[#0e0e10] rounded-t-[2rem] shadow-[0_-8px_32px_rgba(157,78,221,0.15)]">
<!-- Nickname / Profile -->
<div class="flex flex-col items-center justify-center text-[#d095ff]/50 px-6 py-2 hover:bg-[#d095ff]/10 transition-all rounded-full cursor-pointer">
<span class="material-symbols-outlined mb-1">person</span>
<span class="font-['Plus_Jakarta_Sans'] font-extrabold tracking-widest text-xs uppercase">APODO</span>
<span class="text-[10px] font-bold text-[#d095ff]">ALEX</span>
</div>
<!-- Points - Active Intent (Score focused screen) -->
<div class="flex flex-col items-center justify-center bg-[#26fedc]/20 text-[#26fedc] rounded-full px-8 py-2 border border-[#26fedc]/20 animate-pulse">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">stars</span>
<span class="font-['Plus_Jakarta_Sans'] font-extrabold tracking-widest text-xs uppercase">8,450 PTS</span>
</div>
<!-- Streak -->
<div class="flex flex-col items-center justify-center text-[#d095ff]/50 px-6 py-2 hover:bg-[#d095ff]/10 transition-all rounded-full cursor-pointer">
<span class="material-symbols-outlined mb-1 text-error" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<span class="font-['Plus_Jakarta_Sans'] font-extrabold tracking-widest text-xs uppercase">RACHA X3</span>
</div>
</nav>
</body></html>
